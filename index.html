<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Jet — Jet Supply</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#15375B;--orange:#EA5618;--bg:#F0F3F6;--surface:#FFFFFF;
  --soft:#F7F9FB;--callout:#FDEEE5;
  --t1:#333;--t2:#555;--t3:#666;--t4:#777;--t5:#999;
  --on-navy:#FFF;--on-soft:#AAC4DD;--on-faint:#6A94B5;
  --border:#E8ECF0;--border-c:#E0E8F0;
  --green:#1A7A4A;--green-l:#E8F5EE;
  --amber:#B45309;--amber-l:#FEF3C7;
  --red:#C0392B;--red-l:#FDEEEC;
  --rc:10px;--rb:8px;--rbt:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:52px 1fr;height:100vh}

/* Topbar */
.topbar{grid-column:1/-1;background:var(--navy);display:flex;align-items:center;padding:0 16px;gap:12px}
.topbar-logo{height:28px;flex-shrink:0}
.topbar-div{width:1px;height:22px;background:var(--on-faint)}
.topbar-name{font-size:13px;font-weight:bold;color:var(--on-navy)}
.topbar-sub{font-size:10px;color:var(--on-soft);margin-top:1px}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--on-faint);flex-shrink:0}
.status-dot.ok{background:#4ade80}
.status-dot.warn{background:#fbbf24}
.status-txt{font-size:11px;color:var(--on-soft)}
.sync-btn{padding:4px 10px;border-radius:var(--rbt);border:1px solid var(--on-faint);background:transparent;color:var(--on-soft);font-size:11px;cursor:pointer;font-family:inherit}
.sync-btn:hover{border-color:var(--on-navy);color:var(--on-navy)}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-sec{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-lbl{font-size:10px;font-weight:bold;color:var(--t5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.upload-z{border:1.5px dashed var(--border-c);border-radius:var(--rb);padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.upload-z:hover{border-color:var(--orange);background:var(--callout)}
.upload-z input{display:none}
.upload-z strong{font-size:12px;color:var(--t1);display:block}
.upload-z p{font-size:11px;color:var(--t5);margin-top:2px}
.file-ok{background:var(--green-l);border:1px solid #86efac;border-radius:var(--rb);padding:9px 11px}
.file-ok-name{font-size:12px;font-weight:bold;color:var(--green)}
.file-ok-sub{font-size:11px;color:var(--green);margin-top:1px}

.cfg-row{margin-bottom:7px}
.cfg-lbl{font-size:11px;color:var(--t4);display:block;margin-bottom:3px}
.cfg-inp{width:100%;padding:5px 8px;border:1px solid var(--border-c);border-radius:var(--rbt);font-size:12px;background:var(--bg);color:var(--t1);outline:none;font-family:inherit}
.cfg-inp:focus{border-color:var(--navy)}
.cfg-2{display:flex;gap:5px}
.cfg-2 input{flex:1}
.cfg-btn{padding:5px 9px;border:1px solid var(--border-c);border-radius:var(--rbt);background:var(--bg);font-size:11px;cursor:pointer;color:var(--t4);font-family:inherit;white-space:nowrap}
.cfg-btn:hover{border-color:var(--navy);color:var(--navy)}

/* Pendências */
.pend-area{flex:1;overflow-y:auto;padding:10px 14px}
.pend-empty{font-size:11px;color:var(--t5);text-align:center;padding:20px 4px;line-height:1.7}
.pend-item{border:1px solid var(--border-c);border-radius:var(--rb);margin-bottom:8px;overflow:hidden}
.pend-head{background:var(--amber-l);padding:7px 10px;display:flex;align-items:center;gap:6px}
.pend-head-txt{font-size:11px;font-weight:bold;color:var(--amber);flex:1}
.pend-body{padding:8px 10px}
.pend-q{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:bold}
.pend-inp{width:100%;padding:5px 8px;border:1px solid var(--border-c);border-radius:var(--rbt);font-size:11px;background:var(--bg);color:var(--t1);outline:none;font-family:inherit;margin-bottom:5px}
.pend-inp:focus{border-color:var(--orange)}
.pend-save{padding:4px 12px;border-radius:var(--rbt);border:none;background:var(--orange);color:#fff;font-size:11px;font-weight:bold;cursor:pointer;font-family:inherit}
.pend-save:hover{opacity:.88}
.pend-skip{padding:4px 10px;border-radius:var(--rbt);border:1px solid var(--border-c);background:transparent;color:var(--t4);font-size:11px;cursor:pointer;font-family:inherit;margin-left:5px}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}

.msg{max-width:720px}
.msg-a{align-self:flex-start}
.msg-u{align-self:flex-end}
.msg-lbl{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;color:var(--t5);margin-bottom:3px;padding:0 2px}
.msg-u .msg-lbl{text-align:right}
.bubble{padding:11px 14px;border-radius:var(--rc);font-size:13px;line-height:1.6;color:var(--t2)}
.msg-a .bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 10px 10px 10px}
.msg-u .bubble{background:var(--navy);color:var(--on-navy);border-radius:10px 4px 10px 10px}

/* Preview */
.preview{border:1px solid var(--border-c);border-radius:var(--rb);overflow:hidden;margin-top:8px;font-size:11px}
.preview table{width:100%;border-collapse:collapse}
.preview th{background:var(--bg);padding:5px 9px;text-align:left;font-weight:bold;color:var(--t5);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.preview td{padding:6px 9px;border-bottom:1px solid var(--border);vertical-align:top}
.preview tr:last-child td{border-bottom:none}
.td-old{color:var(--t5);text-decoration:line-through;font-size:10px}
.td-new{color:var(--t1);font-weight:bold;margin-top:1px}
.td-warn{background:#fffbeb}
.td-pend{background:var(--amber-l)}
.badge{display:inline-block;font-size:10px;font-weight:bold;padding:1px 6px;border-radius:10px}
.b-ok{background:var(--green-l);color:var(--green)}
.b-pend{background:var(--amber-l);color:var(--amber)}
.b-err{background:var(--red-l);color:var(--red)}

.act-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
.act-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--border-c);background:var(--surface);font-size:12px;cursor:pointer;color:var(--navy);font-family:inherit;font-weight:bold;transition:all .15s}
.act-btn:hover{border-color:var(--navy);background:var(--soft)}
.act-btn.pri{background:var(--orange);color:#fff;border-color:transparent}
.act-btn.pri:hover{opacity:.9}
.act-btn.sec{background:var(--navy);color:#fff;border-color:transparent}

/* Relatório */
.report{border:1px solid var(--border-c);border-radius:var(--rb);overflow:hidden;margin-top:8px}
.report-head{background:var(--navy);padding:8px 12px;font-size:12px;font-weight:bold;color:var(--on-navy);display:flex;justify-content:space-between;align-items:center}
.report-stats{display:flex;gap:12px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--soft)}
.stat{text-align:center}
.stat-n{font-size:18px;font-weight:bold}
.stat-l{font-size:10px;color:var(--t5);margin-top:1px}
.n-ok{color:var(--green)}.n-pend{color:var(--amber)}.n-err{color:var(--red)}

/* DL bar */
.dl-bar{background:var(--green-l);border-top:1px solid #86efac;padding:9px 20px;display:none;align-items:center;gap:10px}
.dl-bar.show{display:flex}
.dl-bar p{font-size:12px;color:var(--green);flex:1;font-weight:bold}
.dl-btn{padding:7px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--rbt);font-size:12px;font-weight:bold;cursor:pointer;font-family:inherit}

/* Input */
.inp-area{padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--surface)}
.inp-row{display:flex;gap:7px;align-items:flex-end}
.inp-wrap{flex:1;border:1px solid var(--border-c);border-radius:var(--rc);background:var(--bg);display:flex;align-items:center;padding:7px 11px;gap:7px;transition:border-color .15s}
.inp-wrap:focus-within{border-color:var(--navy)}
.inp{flex:1;border:none;background:transparent;font-size:13px;outline:none;resize:none;color:var(--t1);font-family:inherit;max-height:80px}
.inp::placeholder{color:var(--t5)}
.send{width:34px;height:34px;border-radius:var(--rbt);background:var(--orange);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send:hover{opacity:.85}
.send:disabled{opacity:.35;cursor:default}
.send svg{width:15px;height:15px;fill:#fff}

/* Typing */
.typing{display:flex;gap:4px;align-items:center}
.typing span{width:5px;height:5px;background:var(--border-c);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* Base viewer */
.base-card{background:var(--soft);border:1px solid var(--border-c);border-radius:var(--rb);padding:10px 12px;margin-top:8px;font-size:11px}
.base-marca{font-weight:bold;color:var(--navy);margin-bottom:4px;font-size:12px}
.base-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.base-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--t3)}
</style>
</head>

<script>
// ── Configuração ─────────────────────────────────────────────────────
const CONFIG = {
  GH_TOKEN: '',  // cada usuário preenche na primeira vez
  GH_REPO:  'Piresmathhh/jetsupply-agente-jet',
};

// ── Estado global ────────────────────────────────────────────────────
let products = [];
let kb = null;
let kbSha = null;
let pendentes = [];

// ── Formatação de nome ────────────────────────────────────────────────
const UPPER_GLOBAL = new Set(['VCA','VCC','CA','CC','AC','DC','VA','KW','KVA','MW','HZ','KHZ','MHZ','IP','IK','NBR','ABNT','IEC','NR','1P','2P','3P','4P','5P','DIN','NEMA','UL','CE']);
const LOWER_CONN   = new Set(['de','do','da','dos','das','e','a','o','em','para','com','por','na','no','nas','nos']);

function getMarcaConfig(marcaNome) {
  if (!kb) return null;
  const key = Object.keys(kb.marcas || {}).find(k => k.toLowerCase() === (marcaNome||'').toLowerCase());
  return key ? kb.marcas[key] : null;
}

function getSiglasUpper(marcaNome) {
  const cfg = getMarcaConfig(marcaNome);
  const siglas = new Set(UPPER_GLOBAL);
  if (cfg) {
    (cfg.siglas_modelos || []).forEach(s => siglas.add(s.toUpperCase()));
    (cfg.unidades_upper || []).forEach(u => siglas.add(u.toUpperCase()));
  }
  if (kb) (kb.unidades_globais || []).forEach(u => siglas.add(u.toUpperCase()));
  return siglas;
}

function formatToken(token, isFirst, upper) {
  if (/^[-\/.,]$/.test(token)) return token;
  const up = token.toUpperCase();
  if (upper.has(up)) return up;
  const m = token.match(/^(\d+(?:[.,]\d+)?)(A|V|W|VA|KW|KVA|MW|VCA|VCC|HZ|KHZ|MHZ|KV|CV|HP|RPM|BAR|PSI)$/i);
  if (m) return m[1] + m[2].toUpperCase();
  if (/^\d+VCA\/\d+VCC$/i.test(token)) return token.toUpperCase();
  if (/^[1-5]P$/i.test(token)) return token.toUpperCase();
  if (/^\d+$/.test(token)) return token;
  if (LOWER_CONN.has(token.toLowerCase()) && !isFirst) return token.toLowerCase();
  return token.charAt(0).toUpperCase() + token.slice(1).toLowerCase();
}

function formatName(raw, marcaNome) {
  if (!raw) return '';
  const upper = getSiglasUpper(marcaNome);
  const parts = raw.trim().split(/(\s*-\s*)/);
  let out = [], isFirst = true;
  for (const p of parts) {
    if (/^\s*-\s*$/.test(p)) { out.push(' - '); continue; }
    const words = p.trim().split(/\s+/).filter(Boolean);
    if (!words.length) continue;
    out.push(words.map((w,i) => formatToken(w, isFirst && i===0, upper)).join(' '));
    isFirst = false;
  }
  // Aplicar regras globais
  let result = out.join('').replace(/\s{2,}/g,' ').trim();
  if (kb) {
    for (const r of (kb.regras_globais || [])) {
      result = result.replace(new RegExp(r.de.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), r.para);
    }
    const cfg = getMarcaConfig(marcaNome);
    if (cfg) for (const r of (cfg.regras_nome || [])) {
      result = result.replace(new RegExp(r.de.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), r.para);
    }
  }
  return result;
}

function limparPlanilha() {
  products = [];
  pendentes = [];
  document.getElementById('upload-area').innerHTML =
    `<label class="upload-z" for="file-in">
      <input type="file" id="file-in" accept=".xlsx,.xls">
      <strong>Selecionar arquivo</strong>
      <p>Exportação do Signus (.xlsx)</p>
    </label>`;
  document.getElementById('file-in').addEventListener('change', handleFileUpload);
  document.getElementById('dl-bar').classList.remove('show');
  renderPendentes();
  addAgentMsg('Planilha removida. Faça o upload de uma nova quando quiser.');
}

// ── GitHub API ────────────────────────────────────────────────────────
function ghToken() { return CONFIG.GH_TOKEN || document.getElementById('gh-token')?.value.trim() || ''; }
function ghRepo()  { return CONFIG.GH_REPO  || document.getElementById('gh-repo')?.value.trim()  || ''; }
function ghHeaders() {
  return {
    'Authorization': `token ${ghToken()}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

async function loadKB() {
  const repo = ghRepo();
  const token = document.getElementById('gh-token').value.trim();
  if (!repo || !token) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/contents/conhecimento.json`, { headers: ghHeaders() });
    if (r.ok) {
      const d = await r.json();
      kbSha = d.sha;
      kb = JSON.parse(atob(d.content.replace(/\n/g,'')));
      setGhStatus('ok', `Base carregada · ${Object.keys(kb.marcas||{}).length} marcas cadastradas · ${Object.keys(kb.marcas_zydon||{}).length} marcas Zydon`);
      document.getElementById('sync-btn').style.display = '';
    } else if (r.status === 404) {
      // Criar arquivo inicial
      await saveKB(defaultKB(), 'Base inicializada');
      setGhStatus('ok', 'Base criada no repositório');
    }
  } catch(e) {
    setGhStatus('err', 'Erro ao conectar ao GitHub');
  }
}

function defaultKB() {
  return {
    versao:'1.0',
    marcas:{ WEG:{ nome_exibicao:'WEG', siglas_modelos:['MDW','CFW','HGF','CWM','SSW','RW','BSW'], unidades_upper:['VCA','VCC'], regras_nome:[] } },
    categorias:{}, unidades_globais:['A','V','W','VA','KW','KVA','MW','HP','CV','HZ','RPM','VCA','VCC','IP','IK','BAR','PSI'],
    regras_globais:[], historico:[{data:new Date().toISOString().slice(0,10), usuario: userName(), acao:'Base inicializada'}]
  };
}

async function saveKB(data, msg) {
  const repo = ghRepo();
  const token = document.getElementById('gh-token').value.trim();
  if (!repo || !token) return false;
  const body = { message: `[Agente Jet] ${msg}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))) };
  if (kbSha) body.sha = kbSha;
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/contents/conhecimento.json`, {
      method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body)
    });
    if (r.ok) {
      const d = await r.json();
      kbSha = d.content.sha;
      kb = data;
      return true;
    }
  } catch(e) {}
  return false;
}

async function syncGitHub() {
  setGhStatus('warn', 'Sincronizando...');
  await loadKB();
}

async function learnAndSave(updates, histMsg) {
  if (!kb) kb = defaultKB();
  Object.assign(kb, updates);
  kb.historico = kb.historico || [];
  kb.historico.unshift({ data: new Date().toISOString().slice(0,10), usuario: userName(), acao: histMsg });
  if (kb.historico.length > 100) kb.historico = kb.historico.slice(0, 100);
  const ok = await saveKB(kb, histMsg);
  if (ok) setGhStatus('ok', `Base atualizada · ${Object.keys(kb.marcas||{}).length} marcas`);
  return ok;
}

function userName() { return document.getElementById('user-name').value.trim() || 'Usuário'; }
function setGhStatus(st, txt) {
  const dot = document.getElementById('gh-dot');
  dot.className = 'status-dot' + (st==='ok'?' ok':st==='warn'?' warn':'');
  document.getElementById('gh-txt').textContent = txt;
}

// ── Verificação de marca desconhecida ─────────────────────────────────
function marcaConhecida(marca) {
  if (!marca || !kb) return false;
  return Object.keys(kb.marcas||{}).some(k => k.toLowerCase() === marca.toLowerCase());
}

function analisarProduto(p) {
  const marca = p['Marca'] || '';
  const issues = [];
  if (marca && !marcaConhecida(marca)) issues.push({ tipo:'marca', valor:marca });
  const cat = p['Grupo setorial'] || '';
  // Só pede mapeamento de categoria se não conseguir resolver automaticamente
  if (cat && kb && kb.categorias && !kb.categorias[cat]) {
    const upper = cat.toUpperCase();
    const jaConhece = CATS_ZYDON[upper] ||
      (kb?.categorias_zydon_por_nome?.[upper]) ||
      Object.keys(CATS_ZYDON).some(k => k.includes(upper) || upper.includes(k));
    if (!jaConhece) issues.push({ tipo:'categoria', valor:cat });
  }
  return issues;
}

// ── Upload ────────────────────────────────────────────────────────────
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev) {
    const wb = XLSX.read(ev.target.result, { type:'array' });
    products = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    document.getElementById('upload-area').innerHTML =
      `<div class="file-ok">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="file-ok-name">${file.name}</div>
            <div class="file-ok-sub">${products.length} produtos</div>
          </div>
          <button onclick="limparPlanilha()" title="Remover planilha" style="background:none;border:none;cursor:pointer;color:#1A7A4A;font-size:18px;padding:2px 4px;line-height:1" >×</button>
        </div>
      </div>`;
    await processarLote();
  };
  reader.readAsArrayBuffer(file);
}
document.getElementById('file-in').addEventListener('change', handleFileUpload);

async function processarLote() {
  if (!products.length) return;
  if (!kb) await loadKB();
  if (!kb) kb = defaultKB();

  pendentes = [];
  const processados = [], novos_pend = [];

  for (const p of products) {
    const issues = analisarProduto(p);
    const nome = formatName(p['Nome']||'', p['Marca']||'');
    if (issues.length) {
      novos_pend.push({ produto: p, issues, nomeFormatado: nome });
    } else {
      processados.push({ ...p, _nomeFormatado: nome });
    }
  }
  pendentes = novos_pend;

  const nOk = processados.length;
  const nPend = pendentes.length;

  addAgentMsg(
    `Lote processado: <strong>${products.length} produtos</strong><br><br>` +
    `<strong style="color:var(--green)">${nOk} prontos</strong> — regras conhecidas aplicadas<br>` +
    `<strong style="color:var(--amber)">${nPend} pendentes</strong> — ${nPend > 0 ? 'veja as dúvidas na barra lateral' : 'nenhuma dúvida!'}`,
    nOk > 0 ? buildPreview(products.slice(0,5)) : ''
  );

  renderPendentes();

  if (nOk > 0) {
    setTimeout(() => {
      const area = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'msg msg-a';
      div.innerHTML = `<div class="msg-lbl">Agente Jet</div><div class="bubble">
        <div class="act-row">
          <button class="act-btn pri" onclick="gerarPlanilha()">Gerar planilha Zydon</button>
          <button class="act-btn" onclick="sendQuick('Mostrar todos os produtos formatados')">Ver todos</button>
        </div></div>`;
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }, 300);
  }
}

function buildPreview(rows) {
  const marcas = [...new Set(rows.map(r=>r['Marca']||'').filter(Boolean))];
  const thead = `<tr><th>Nome formatado</th><th>Marca</th><th>Status</th></tr>`;
  const tbody = rows.map(r => {
    const nome = formatName(r['Nome']||'', r['Marca']||'');
    const issues = analisarProduto(r);
    const cls = issues.length ? 'td-pend' : '';
    const badge = issues.length
      ? `<span class="badge b-pend">pendente</span>`
      : `<span class="badge b-ok">pronto</span>`;
    return `<tr class="${cls}">
      <td><div class="td-old">${(r['Nome']||'').slice(0,60)}</div><div class="td-new">${nome.slice(0,60)}</div></td>
      <td style="white-space:nowrap;color:var(--t4)">${r['Marca']||''}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
  return `<div class="preview"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

function renderPendentes() {
  const area = document.getElementById('pend-area');
  const count = document.getElementById('pend-count');
  if (!pendentes.length) {
    count.textContent = '';
    area.innerHTML = '<div class="pend-empty">Sem pendências.<br>Tudo processado!</div>';
    return;
  }
  count.textContent = `${pendentes.length} pendente${pendentes.length>1?'s':''}`;

  // Agrupar por marca desconhecida
  const porMarca = {};
  const porCat = {};
  pendentes.forEach(p => {
    p.issues.forEach(issue => {
      if (issue.tipo === 'marca') {
        if (!porMarca[issue.valor]) porMarca[issue.valor] = [];
        porMarca[issue.valor].push(p);
      }
      if (issue.tipo === 'categoria') {
        if (!porCat[issue.valor]) porCat[issue.valor] = [];
        porCat[issue.valor].push(p);
      }
    });
  });

  let html = '';

  // Pendências de marca
  Object.entries(porMarca).forEach(([marca, prods]) => {
    const marcaId = marca.replace(/[^a-zA-Z0-9]/g,'_');
    html += `<div class="pend-item">
      <div class="pend-head">
        <div class="pend-head-txt">⚠ Marca nova: ${marca} (${prods.length} prod.)</div>
      </div>
      <div class="pend-body">
        <div class="pend-q">Como escrever o nome desta marca?</div>
        <input class="pend-inp" id="pend-nome-${marcaId}" placeholder="Ex: Schneider Electric" value="${marca}">
        <div class="pend-q" style="margin-top:6px">Siglas maiúsculas (vírgula):</div>
        <input class="pend-inp" id="pend-siglas-${marcaId}" placeholder="Ex: NSX, IC60, A9...">
        <button class="pend-save" onclick="salvarMarca('${marca}','${marcaId}')">Salvar e aplicar</button>
        <button class="pend-skip" onclick="pularMarca('${marca}')">Pular</button>
      </div>
    </div>`;
  });

  // Pendências de categoria
  Object.entries(porCat).forEach(([cat, prods]) => {
    const catId = cat.replace(/[^a-zA-Z0-9]/g,'_');
    html += `<div class="pend-item">
      <div class="pend-head">
        <div class="pend-head-txt">📂 Categoria nova: ${cat.length>28?cat.slice(0,28)+'…':cat} (${prods.length} prod.)</div>
      </div>
      <div class="pend-body">
        <div class="pend-q">Como chamar esta categoria na Zydon?</div>
        <input class="pend-inp" id="pend-cat-${catId}" placeholder="Ex: Disjuntores Miniatura" value="${cat}">
        <button class="pend-save" onclick="salvarCategoria('${cat}','${catId}')">Salvar</button>
        <button class="pend-skip" onclick="pularCategoria('${cat}')">Pular</button>
      </div>
    </div>`;
  });

  area.innerHTML = html || '<div class="pend-empty">Sem pendências.<br>Tudo processado!</div>';
}

async function salvarMarca(marcaOriginal, marcaId) {
  const id = marcaId || marcaOriginal.replace(/[^a-zA-Z0-9]/g,'_');
  const nomeExib = document.getElementById(`pend-nome-${id}`)?.value.trim() || marcaOriginal;
  const siglasRaw = document.getElementById(`pend-siglas-${id}`)?.value.trim() || '';
  const siglas = siglasRaw.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
  if (!kb) kb = defaultKB();
  kb.marcas = kb.marcas || {};
  kb.marcas[nomeExib] = { nome_exibicao:nomeExib, siglas_modelos:siglas, unidades_upper:[], regras_nome:[] };
  const ok = await learnAndSave(kb, `Adicionou marca: ${nomeExib}`);
  pendentes = pendentes.filter(p => !p.issues.some(i => i.tipo==='marca' && i.valor===marcaOriginal));
  renderPendentes();
  addAgentMsg(`Marca <strong>${nomeExib}</strong> salva${siglas.length?` com siglas: ${siglas.join(', ')}`:''}.${ok?' Base sincronizada no GitHub.':' Erro ao sincronizar.'}`);
  if (!pendentes.length) setTimeout(()=>addAgentMsg('Tudo certo! Pode gerar a planilha.',`<div class="act-row"><button class="act-btn pri" onclick="gerarPlanilha()">Gerar planilha Zydon</button></div>`),400);
}

function pularMarca(marca) {
  pendentes = pendentes.filter(p => !p.issues.some(i => i.tipo==='marca' && i.valor===marca));
  renderPendentes();
}

async function salvarCategoria(catOriginal, catId) {
  const id = catId || catOriginal.replace(/[^a-zA-Z0-9]/g,'_');
  const nomeZydon = document.getElementById(`pend-cat-${id}`)?.value.trim() || catOriginal;
  if (!kb) kb = defaultKB();
  kb.categorias = kb.categorias || {};
  kb.categorias[catOriginal] = nomeZydon;
  const ok = await learnAndSave(kb, `Mapeou categoria: "${catOriginal}" → "${nomeZydon}"`);
  pendentes = pendentes.filter(p => !p.issues.some(i => i.tipo==='categoria' && i.valor===catOriginal));
  renderPendentes();
  addAgentMsg(`Categoria <strong>"${catOriginal}"</strong> → <strong>"${nomeZydon}"</strong> salva.${ok?' GitHub sincronizado.':''}`);
  if (!pendentes.length) setTimeout(()=>addAgentMsg('Tudo certo! Pode gerar a planilha.',`<div class="act-row"><button class="act-btn pri" onclick="gerarPlanilha()">Gerar planilha Zydon</button></div>`),400);
}

}

// ── Gerar planilha ────────────────────────────────────────────────────
function gerarPlanilha() {
  if (!products.length) { addAgentMsg('Nenhuma planilha carregada.'); return; }
  const imgBase = (document.getElementById('img-url').value||'').trim().replace(/\/$/,'');

  // Buscar códigos reais da Zydon na base de conhecimento
  const codZydon = kb?.codigos_zydon || {};
  const marcasZydon = kb?.marcas_zydon || {};
  const catZydonMap = kb?.categorias || {};

  function getMarcaCodigo(nomeMarca) {
    if (!nomeMarca) return '';
    // Busca exata
    if (marcasZydon[nomeMarca]) return marcasZydon[nomeMarca];
    // Busca parcial
    const key = Object.keys(marcasZydon).find(k =>
      k.toLowerCase().includes(nomeMarca.toLowerCase()) ||
      nomeMarca.toLowerCase().includes(k.toLowerCase())
    );
    return key ? marcasZydon[key] : '';
  }

  // Mapa de categorias Zydon embutido (Signus → código Zydon)
  const CATS_ZYDON = {"MATERIAIS ELÉTRICOS":488,"DISJUNTORES":489,"DISJUNTORES CAIXA MOLDADA":490,"ACESSÓRIOS":566,"1P MONOPOLAR":561,"2P BIPOLAR":537,"3P TRIPOLAR":563,"4P TETRAPOLAR":538,"DISJUNTORES MINI":494,"DISJUNTORES A VÁCUO":502,"3P TRIPOLAR EXTRAÍVEL":516,"3P TRIPOLAR FIXO":517,"4P TETRAPOLAR EXTRAÍVEL":518,"4P TETRAPOLAR FIXO":519,"DISJUNTORES ABERTO":508,"DISJUNTORES A GÁS":514,"DISJUNTORES MOTOR":520,"DPS - DISPOSITIVO DE PROTEÇÃO CONTRA SURTOS":539,"CLASSE I":540,"CLASSE I + II":545,"CLASSE II":550,"CLASSE II + III":555,"CLASSE III":560,"FUSÍVEIS":565,"BASE PARA FUSÍVEL":567,"EXTRATOR DE FUSÍVEL":568,"INDICADOR DE FUSÃO":569,"PORTA-FUSÍVEL":570,"SUPORTE PARA FUSÍVEL":571,"AUTOMOTIVO":572,"LÂMINA":573,"MAXI":574,"MICRO":575,"MINI LÂMINA":576,"CILÍNDRICO":577,"AM":590,"AR":593,"GL/GG":594,"GPV":595,"GR":596,"DIAZED":583,"HH - ALTA TENSÃO":586,"LIMITADOR DE CORRENTE":587,"RETARDADO":599,"NEOZED":589,"NH":592,"VIDRO":597,"RÁPIDO":598,"IDR - INTERRUPTORES DIFERENCIAIS RESIDUAIS":526,"TIPO A":527,"TIPO AC":530,"TIPO B":533,"TIPO F":536,"DISJUNTOR MINI 1P MONOPOLAR":495,"DISJUNTOR MINI 2P BIPOLAR":496,"DISJUNTOR MINI 3P TRIPOLAR":497,"DISJUNTOR MINI 4P TETRAPOLAR":498,"DISJUNTOR CAIXA MOLDADA 1P MONOPOLAR":501,"DISJUNTOR CAIXA MOLDADA 2P BIPOLAR":491,"DISJUNTOR CAIXA MOLDADA 3P TRIPOLAR":492,"DISJUNTOR CAIXA MOLDADA 4P TETRAPOLAR":493,"DISJUNTOR MOTOR 1P MONOPOLAR":522,"DISJUNTOR MOTOR 2P BIPOLAR":523,"DISJUNTOR MOTOR 3P TRIPOLAR":524,"DISJUNTOR MOTOR 4P TETRAPOLAR":525};

  function getCatCodigo(nomecat) {
    if (!nomecat) return '';
    const upper = nomecat.toUpperCase();
    // 1. Mapa embutido (tem precedência)
    if (CATS_ZYDON[upper]) return CATS_ZYDON[upper];
    // 2. Base de conhecimento do GitHub
    if (kb?.categorias_zydon_por_nome?.[upper]) return kb.categorias_zydon_por_nome[upper];
    // 3. Busca parcial no mapa embutido
    const key = Object.keys(CATS_ZYDON).find(k => k.includes(upper) || upper.includes(k));
    if (key) return CATS_ZYDON[key];
    return '';
  }

  // Agrupar por Cód. agrupamento para montar EAN_VARIACAO
  const gruposEan = {};
  products.forEach(p => {
    const g = p['Cód. agrupamento'];
    if (g) {
      if (!gruposEan[g]) gruposEan[g] = [];
      const ean = p['Código barras'] ? String(Math.round(Number(p['Código barras']))) : '';
      if (ean) gruposEan[g].push(ean);
    }
  });

  const rows = products.map(p => {
    const nome = formatName(p['Nome']||'', p['Marca']||'');
    const marc = p['Marca']||'';
    const cat  = p['Grupo setorial']||'';
    const gen  = p['Gênero']||'';
    const lin  = p['Linha de produto']||'';
    const un   = p['Unidade de medida']||'';
    const pG   = p['Peso'] ? Math.round(Number(p['Peso'])*1000) : '';
    const ean  = p['Código barras'] ? String(Math.round(Number(p['Código barras']))) : '';

    // Códigos reais da Zydon
    const marcaCod = getMarcaCodigo(marc);
    const unCod    = codZydon.unidade_padrao?.codigo || '';
    const cdCod    = codZydon.centro_distribuicao?.codigo || '';
    const cdNome   = codZydon.centro_distribuicao?.nome || '';

    // Categoria — buscar código real da Zydon
    const catNomeZydon = catZydonMap[cat] || cat;
    const catCod = getCatCodigo(catNomeZydon) || getCatCodigo(cat);

    // EAN_VARIACAO — todos os EANs do agrupamento separados por ;
    const grpCod = p['Cód. agrupamento'];
    const eanVariacao = grpCod && gruposEan[grpCod] ? gruposEan[grpCod].join('; ') : ean;

    return {
      'Imagem Principal': imgBase?`${imgBase}/${p['Código']||''}.jpg`:'',
      'Código': String(p['ID']||''),
      'Ativo': String(p['Situação']||'').toUpperCase()==='ATIVO'?'Sim':'Não',
      'Nome': nome, 'SKU': String(p['Código']||''),
      'Descrição Curta': nome,
      'Descrição Longa': String(p['Descrição']||'').replace(/_x000D_/g,'').replace(/\r/g,'').trim(),
      'EAN/GTIN': ean, 'Marca (Código)': marcaCod, 'Marca (Nome)': marc,
      'Vídeo':'','Preço': 0,'Estoque': 0,
      'Centro de Distribuição Padrão (Código)': cdCod,'Centro de Distribuição Padrão (Nome)': cdNome,
      'Desconto Máximo (%)': 0,'Estoque Mínimo': 0,'Quantidade Mínima p/ Venda': 0,'Múltiplo p/ Venda': 0,
      'Unidade Padrão (Código)': unCod,'Unidade Padrão (Abreviação)': un,
      'Categoria (Código)': catCod,'Categoria (Nome)': catNomeZydon,
      'Peso (g)': pG, 'Largura (cm)': p['Largura (cm)']||'',
      'Altura (cm)': p['Altura (cm)']||'', 'Profundidade (cm)': p['Profundidade (cm)']||'',
      'Peso da Embalagem (g)': pG,'Largura da Embalagem (cm)': p['Largura (cm)']||'',
      'Altura da Embalagem (cm)': p['Altura (cm)']||'','Profundidade da Embalagem (cm)': p['Profundidade (cm)']||'',
      'Destaque':'','Título do SEO': nome,'Descrição do SEO': nome,
      'Palavras-chave do SEO': [marc,cat,gen].filter(Boolean).join(', '),
      'Acréscimo Máximo': 0,'Tags': [lin,gen].filter(Boolean).join(', '),
      'EAN_VARIACAO': eanVariacao,
    };
  });

  const grupos={};
  products.forEach(p=>{ const g=p['Cód. agrupamento']; if(g){if(!grupos[g])grupos[g]=[];grupos[g].push(p);}});
  const sims=[]; let sid=1;
  Object.values(grupos).forEach(grp=>{
    if(grp.length<2)return;
    for(let i=0;i<grp.length;i++) for(let j=i+1;j<grp.length;j++)
      [[grp[i],grp[j]],[grp[j],grp[i]]].forEach(([a,b])=>{
        sims.push({'Código':sid++,'Produto (Código)':String(a['ID']||''),'Produto (Nome)':formatName(a['Nome']||'',a['Marca']||''),'Produto Similar (Código)':String(b['ID']||''),'Produto Similar (Nome)':formatName(b['Nome']||'',b['Marca']||'')});
      });
  });

  // ── Gerar aba Variações ───────────────────────────────────────────
  // Ordenação natural: extrai número do início do valor de variação
  function naturalOrder(valor) {
    if (!valor) return 9999;
    const m = String(valor).match(/^(\d+(?:[.,]\d+)?)/);
    return m ? parseFloat(m[1].replace(',','.')) : 9999;
  }

  // Identificar o atributo de variação de cada grupo (ex: Corrente elétrica)
  // A diferença entre os produtos do grupo revela o atributo
  function extrairValorVariacao(produto, grupoBase) {
    // Tentar extrair do nome: diferença entre produtos do mesmo grupo
    // Usa o campo Corrente elétrica se existir, senão extrai do nome
    const corrente = produto['Corrente elétrica'] || produto['Corrente'] || '';
    if (corrente) return String(corrente);
    // Fallback: extrair do nome (ex: "10A" do nome completo)
    const nome = produto['Nome'] || '';
    const m = nome.match(/\b(\d+(?:[.,]\d+)?A)\b/i);
    return m ? m[1].toUpperCase() : String(produto['Código'] || '');
  }

  const variacoes = [];
  Object.entries(grupos).forEach(([grpCod, grp]) => {
    if (grp.length < 1) return;

    // Produto pai = primeiro do grupo (ou poderia ser o de menor corrente)
    // O Código do produto pai é o Cód. agrupamento
    const pai = grp[0];
    const codPai = String(pai['ID'] || '');
    const nomePai = formatName(pai['Nome']||'', pai['Marca']||'');

    // Extrair valores de variação e ordenar naturalmente
    const comValor = grp.map(p => ({
      produto: p,
      valor: extrairValorVariacao(p, grp)
    }));
    comValor.sort((a, b) => naturalOrder(a.valor) - naturalOrder(b.valor));

    comValor.forEach((item, idx) => {
      const p = item.produto;
      const pG = p['Peso'] ? Math.round(Number(p['Peso'])*1000) : '';
      const ean = p['Código barras'] ? String(Math.round(Number(p['Código barras']))) : '';
      variacoes.push({
        'Código': String(p['ID']||''),
        'Código produto': codPai,
        'NOME': formatName(p['Nome']||'', p['Marca']||''),
        'SKU': String(p['Código']||''),
        'Status': true,
        'ORDER': idx + 1,
        'Valores': item.valor,
        'PRICE': 0,
        'STOCK': 0,
        'VARIATION_WEIGHT': pG,
        'VARIATION_WIDTH': p['Largura (cm)']||'',
        'VARIATION_HEIGHT': p['Altura (cm)']||'',
        'VARIATION_DEPTH': p['Profundidade (cm)']||'',
        'PACKAGING_WEIGHT': pG,
        'PACKAGING_WIDTH': p['Largura (cm)']||'',
        'PACKAGING_HEIGHT': p['Altura (cm)']||'',
        'PACKAGING_DEPTH': p['Profundidade (cm)']||'',
        'EAN_VARIACAO': ean,
        'Código variação': String(p['ID']||''),
      });
    });
  });

  // Gerar aba Imagens — varrer código principal + _1 até _10 por produto
  const imgs = [];
  let imgSeq = 1;

  for (const p of products) {
    const cod = p['Código'] || '';
    const id  = String(p['ID'] || '');
    const nome = formatName(p['Nome']||'', p['Marca']||'');
    if (!imgBase || !cod) continue;

    // Imagem principal (sem sufixo)
    imgs.push({
      'Produto (Código)': id,
      'Produto (Nome)': nome,
      'Imagem': `${imgBase}/${cod}.jpg`,
    });

    // Imagens extras _1 até _10
    for (let n = 1; n <= 10; n++) {
      imgs.push({
        'Produto (Código)': id,
        'Produto (Nome)': nome,
        'Imagem': `${imgBase}/${cod}_${n}.jpg`,
      });
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Produtos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([]), 'Unidades Alternativas');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([]), 'Ficha Técnica');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sims.length?sims:[]), 'Produtos Similares');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([]), 'Produtos Recomendados');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(variacoes.length?variacoes:[]), 'Variações produtos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(imgs), 'Imagens');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([]), 'Complementos');

  const date = new Date().toISOString().slice(0,10);
  const dl = document.getElementById('dl-bar');
  document.getElementById('dl-msg').textContent = `✓ ${products.length} produtos · ${sims.length} similares · ${pendentes.length} ainda pendentes`;
  dl.classList.add('show');
  document.getElementById('dl-btn').onclick = ()=> XLSX.writeFile(wb,`JetSupply_Zydon_${date}.xlsx`);

  addAgentMsg(`Planilha gerada:<br>
    <strong>${products.length}</strong> produtos · <strong>${variacoes.length}</strong> variações (ORDER calculado) · <strong>${sims.length}</strong> similares · <strong>${imgs.length}</strong> linhas de imagem.
    ${pendentes.length?' <span style="color:var(--amber)">'+pendentes.length+' produto(s) com pendências.</span>':''}`);
}

async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value=''; inp.style.height='auto';
  addUserMsg(txt);
  document.getElementById('send-btn').disabled=true;

  const low = txt.toLowerCase();

  if (low.includes('gerar planilha')||low==='gerar'){ gerarPlanilha(); document.getElementById('send-btn').disabled=false; return; }
  if (low.includes('ver todos')||low.includes('mostrar todos')){
    addAgentMsg(`<strong>${products.length} produtos</strong>:`, buildPreview(products.slice(0,20)));
    document.getElementById('send-btn').disabled=false; return;
  }
  if (low.includes('base de conhecimento')||low.includes('marcas conhecidas')){
    showBase(); document.getElementById('send-btn').disabled=false; return;
  }

  // Regra rápida: "X vira Y"
  const ruleM = txt.match(/[""']?(.+?)[""']?\s+(?:vira|→|->|por|muda para|muda pra|substituir por)\s+[""']?(.+?)[""']?$/i);
  if (ruleM) {
    const de=ruleM[1].trim(), para=ruleM[2].trim();
    if (!kb) kb=defaultKB();
    kb.regras_globais=kb.regras_globais||[];
    kb.regras_globais=kb.regras_globais.filter(r=>r.de.toLowerCase()!==de.toLowerCase());
    kb.regras_globais.push({de,para});
    await learnAndSave(kb,`Regra: "${de}" → "${para}"`);
    addAgentMsg(`Regra salva e sincronizada: <strong>"${de}"</strong> → <strong>"${para}"</strong>`);
    document.getElementById('send-btn').disabled=false; return;
  }

  // Claude API
  const key = document.getElementById('claude-key').value.trim() || localStorage.getItem('jet_claude_key') || '';
  if (!key.startsWith('sk-ant-')){
    addAgentMsg('Configure a <strong>chave API Claude</strong> para perguntas livres.');
    document.getElementById('send-btn').disabled=false; return;
  }
  showTyping();
  try {
    const reply = await callClaude(key, txt);
    removeTyping();
    addAgentMsg(renderMd(reply));
  } catch(e) { removeTyping(); addAgentMsg(`Erro: ${e.message}`); }
  document.getElementById('send-btn').disabled=false;
}

let chatHistory = [];

// ── Renderizar markdown simples ───────────────────────────────────────
function renderMd(text) {
  return text
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')  // headers → negrito
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')      // **bold**
    .replace(/\*(.+?)\*/g, '<em>$1</em>')                  // *italic*
    .replace(/`(.+?)`/g, '<code style="background:var(--bg);padding:1px 4px;border-radius:3px;font-size:11px">$1</code>')
    .replace(/^---+$/gm, '')                                // remove ---
    .replace(/^\s*[-•]\s+(.+)$/gm, '· $1')                // listas → ·
    .replace(/\n{3,}/g, '\n\n')                            // max 2 quebras
    .replace(/\n/g, '<br>');
}
async function callClaude(key, msg) {
  chatHistory.push({ role: 'user', content: msg });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: 500,
      system: buildContext(),
      messages: chatHistory
    })
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${r.status}`); }
  const reply = (await r.json()).content[0].text;
  chatHistory.push({ role: 'assistant', content: reply });
  return reply;
}
